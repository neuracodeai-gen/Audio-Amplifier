<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Sound Amplifier</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>Tab Amplifier</h1>

      <label for="ampRange">Amplification</label>
      <input id="ampRange" type="range" min="1" max="20" step="0.1" value="1" />
      <div class="row">
        <span id="ampLabel">1.0x</span>
        <small>Up to 20x</small>
      </div>

      <button id="toggleBtn" class="on">Turn Off</button>
      <p id="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
